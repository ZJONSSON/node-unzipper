name: Deploy coverage report to Pages

on:
  push:
    branches: ["development"]    # ✅ was "master"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  coverage:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4                    # ✅ was @v3

      - name: Use Node.js 20
        uses: actions/setup-node@v4                  # ✅ was @v3
        with:
          node-version: '20.x'                       # ✅ was 18.x (EOL)

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build --if-present

      - name: Test with coverage
        run: npm test

      - name: Generate coverage badge
        run: npx lcov-badge2 coverage/lcov.info -o coverage/lcov-report/badge.svg

      - name: Setup Pages
        uses: actions/configure-pages@v5             # ✅ was @v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3       # ✅ was @v2
        with:
          path: 'coverage/lcov-report'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4                # ✅ was @v2